{% extends 'base.html' %}

{% block title %}Login - SovoChess{% endblock %}

{% block content %}
<!-- Login form: uses Django's built in auth to check username/password -->
<div style="max-width: 400px; margin: 0 auto; background-color: #16213e; padding: 30px; border-radius: 8px;">
    <h2 style="margin-bottom: 20px; color: #e2b96f;">Login</h2>

    <!-- POST sends form data securely, csrf_token prevents cross site attacks -->
    <form method="POST">
        {% csrf_token %}

        <div style="margin-bottom: 15px;">
            <label>Username</label><br>
            <input type="text" name="username" style="width:100%; padding:8px; margin-top:5px; border-radius:4px; border:none;">
        </div>

        <div style="margin-bottom: 15px;">
            <label>Password</label><br>
            <!-- type="password" hides the input characters -->
            <input type="password" name="password" style="width:100%; padding:8px; margin-top:5px; border-radius:4px; border:none;">
        </div>

        <!-- messages from views.py will show here e.g wrong password -->
        {% if messages %}
            {% for message in messages %}
                <p style="color: red;">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <button type="submit" style="width:100%; padding:10px; background-color:#e2b96f; border:none; border-radius:4px; cursor:pointer;">Login</button>
    </form>

    <p style="margin-top: 15px;">Don't have an account? <a href="{% url 'register' %}" style="color:#e2b96f;">Register</a></p>
</div>
{% endblock %}

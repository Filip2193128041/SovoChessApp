{% extends 'base.html' %}

{% block title %}Register - SovoChess{% endblock %}

{% block content %}
<!-- Register form: creates a new User object in the database -->
<div style="max-width: 400px; margin: 0 auto; background-color: #16213e; padding: 30px; border-radius: 8px;">
    <h2 style="margin-bottom: 20px; color: #e2b96f;">Register</h2>

    <form method="POST">
        {% csrf_token %}

        <div style="margin-bottom: 15px;">
            <label>Username</label><br>
            <input type="text" name="username" style="width:100%; padding:8px; margin-top:5px; border-radius:4px; border:none;">
        </div>

        <div style="margin-bottom: 15px;">
            <label>Email</label><br>
            <input type="email" name="email" style="width:100%; padding:8px; margin-top:5px; border-radius:4px; border:none;">
        </div>

        <div style="margin-bottom: 15px;">
            <label>Password</label><br>
            <input type="password" name="password" style="width:100%; padding:8px; margin-top:5px; border-radius:4px; border:none;">
        </div>

        {% if messages %}
            {% for message in messages %}
                <p style="color: red;">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <button type="submit" style="width:100%; padding:10px; background-color:#e2b96f; border:none; border-radius:4px; cursor:pointer;">Register</button>
    </form>

    <p style="margin-top: 15px;">Already have an account? <a href="{% url 'login' %}" style="color:#e2b96f;">Login</a></p>
</div>
{% endblock %}
